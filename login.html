<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — AuditCS</title>
  <script>
    (function() {
      var saved = localStorage.getItem('acs_theme') || localStorage.getItem('cs_theme');
      var t = saved ? saved : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="assets/brand-mark.svg">
  <link rel="stylesheet" href="assets/css/fonts.css"/>
  <link rel="stylesheet" href="assets/css/variables.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap    { width: 100%; max-width: 380px; }
    .login-header  { text-align: center; margin-bottom: 24px; }
    .login-logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      border-radius: var(--radius-lg);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--primary) 30%, transparent);
    }
    .login-app-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .login-app-sub  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border, var(--line));
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit;
      border: 1px solid var(--border, var(--line));
      border-radius: var(--radius-sm);
      outline: none; transition: border-color .15s, box-shadow .15s;
      color: var(--text); background: var(--bg); box-sizing: border-box;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
    }
    .btn-login {
      width: 100%; padding: 10px; background: var(--primary); color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 600; border: none;
      border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; margin-top: 4px;
    }
    .btn-login:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-login:disabled { opacity: .6; cursor: default; }
    .alert-err {
      margin-top: 14px; padding: 10px 14px;
      background: var(--danger-bg, #fef2f2);
      border: 1px solid color-mix(in srgb, var(--danger) 30%, transparent);
      border-radius: var(--radius-sm);
      color: var(--danger); font-size: 13px;
    }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo-icon">
        <svg viewBox="0 0 44 44" width="58%" height="58%" aria-hidden="true">
          <path d="M8 12a4 4 0 0 1 4-4h16a4 4 0 0 1 4 4v12a4 4 0 0 1-4 4H17.5L11 33v-5.4A4 4 0 0 1 8 23.6z" fill="#fff" opacity=".9"/>
          <path d="M14.5 17.7l3.6 3.6 7.4-7.6" fill="none" stroke="var(--primary)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="login-app-name">AuditCS</div>
      <div class="login-app-sub">Sistema de Auditoría · Customer Service</div>
    </div>
    <div class="login-card">
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email" placeholder="usuario@empresa.com"
                 autocomplete="email" autofocus />
        </div>
        <div class="field">
          <label for="login-pwd">Contraseña</label>
          <input type="password" id="login-pwd" name="password" placeholder="••••••••"
                 autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
      <div class="alert-err" id="login-err" hidden></div>
    </div>
    <div class="login-footer">Herramienta interna — acceso restringido</div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (getSession()) window.location.href = 'index.html';

    const form   = document.getElementById('loginForm');
    const errEl  = document.getElementById('login-err');
    const btn    = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-pwd').value;
      errEl.hidden = true;

      if (!email || !password) {
        errEl.textContent = 'Completá los dos campos.';
        errEl.hidden = false;
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Verificando…';

      try {
        const passwordHash = await sha256(password);
        const data = await callApiRaw('login', { email, passwordHash });
        setSession(data.user, data.sessionToken);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message || 'Error al iniciar sesión. Verificá tu conexión.';
        errEl.hidden = false;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
