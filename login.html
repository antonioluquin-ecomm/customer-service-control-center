<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — AuditCS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #1a3f6b;
      --primary-hover:#14325a;
      --danger:       #991b1b;
      --danger-bg:    #fef2f2;
      --text:         #111827;
      --muted:        #6b7280;
      --line:         #e5e7eb;
      --bg:           #f0f2f7;
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap    { width: 100%; max-width: 380px; }
    .login-header  { text-align: center; margin-bottom: 24px; }
    .login-logo-icon {
      width: 48px; height: 48px; background: var(--primary); border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.5px; margin-bottom: 12px;
    }
    .login-app-name { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .login-app-sub  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .login-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(17,24,39,.08), 0 1px 4px rgba(17,24,39,.04);
      padding: 28px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit;
      border: 1px solid var(--line); border-radius: 8px; outline: none;
      transition: border-color .15s, box-shadow .15s; color: var(--text); background: #fff;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,63,107,.09);
    }
    .btn-login {
      width: 100%; padding: 10px; background: var(--primary); color: #fff;
      font-family: inherit; font-size: 14px; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; transition: background .15s; margin-top: 4px;
    }
    .btn-login:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-login:disabled { opacity: .6; cursor: default; }
    .alert-err {
      display: none; margin-top: 14px; padding: 10px 14px;
      background: var(--danger-bg); border: 1px solid #fecaca;
      border-radius: 8px; color: var(--danger); font-size: 13px;
    }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo-icon">CS</div>
      <div class="login-app-name">AuditCS</div>
      <div class="login-app-sub">Sistema de Auditoría · Customer Service</div>
    </div>
    <div class="login-card">
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email" placeholder="tu@email.com"
                 autocomplete="email" autofocus />
        </div>
        <div class="field">
          <label for="login-pwd">Contraseña</label>
          <input type="password" id="login-pwd" name="password" placeholder="••••••••"
                 autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
      <div class="alert-err" id="login-err"></div>
    </div>
    <div class="login-footer">Herramienta interna — acceso restringido</div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    if (getSession()) window.location.href = 'index.html';

    const form   = document.getElementById('loginForm');
    const errEl  = document.getElementById('login-err');
    const btn    = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-pwd').value;
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Completá los dos campos.';
        errEl.style.display = '';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Verificando…';

      try {
        const passwordHash = await sha256(password);
        const data = await callApiRaw('login', { email, passwordHash });
        setSession(data.user, data.sessionToken);
        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent   = err.message || 'Credenciales incorrectas. Verificá e intentá de nuevo.';
        errEl.style.display = '';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
